name: Go CI/CD

on:
  push:
    branches: [ "main" ]
    tags: # запуск при пуше тегов
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  # ====== JOB 1: тесты ======
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.2

      - name: Install dependencies
        run: go mod download

      - name: Vet code
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v

  # ====== JOB 2: публикация ======
  docker:
    runs-on: ubuntu-latest
    needs: test # запуск только если тесты прошли
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/final-CI-CD:${{ github.ref_name }}
